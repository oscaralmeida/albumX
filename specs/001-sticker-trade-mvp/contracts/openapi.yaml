openapi: 3.0.3
info:
  title: AlbumX API — MVP Troca de Figurinhas
  description: API REST do MVP para cadastro, coleção, repetidas e propostas de troca.
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Desenvolvimento local / Docker Compose (backend)
  - url: http://backend:8080
    description: Rede interna Docker Compose

tags:
  - name: Users
  - name: Collections
  - name: Trades

paths:
  /api/users:
    post:
      tags: [Users]
      summary: Criar usuário
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: Usuário criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/users/{userId}:
    get:
      tags: [Users]
      summary: Buscar usuário por ID
      operationId: getUser
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Usuário encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/users/{userId}/collection/stickers:
    post:
      tags: [Collections]
      summary: Adicionar figurinha à coleção
      operationId: addStickerToCollection
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddStickerRequest'
      responses:
        '200':
          description: Figurinha adicionada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionEntryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/users/{userId}/collection:
    get:
      tags: [Collections]
      summary: Listar coleção do usuário
      operationId: getCollection
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Coleção do usuário
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/users/{userId}/collection/duplicates:
    get:
      tags: [Collections]
      summary: Listar figurinhas repetidas
      operationId: getDuplicates
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Figurinhas com quantidade > 1
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CollectionEntryResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/trades:
    post:
      tags: [Trades]
      summary: Criar proposta de troca
      operationId: createTradeProposal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTradeRequest'
      responses:
        '201':
          description: Proposta criada com status PROPOSED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeProposalResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    get:
      tags: [Trades]
      summary: Listar propostas de troca
      operationId: listTradeProposals
      parameters:
        - name: requesterUserId
          in: query
          schema:
            type: string
            format: uuid
        - name: targetUserId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista de propostas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TradeProposalResponse'

components:
  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    CreateUserRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Maria Colecionadora

    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    AddStickerRequest:
      type: object
      required: [stickerNumber]
      properties:
        stickerNumber:
          type: integer
          minimum: 1
          example: 42

    CollectionEntryResponse:
      type: object
      properties:
        stickerNumber:
          type: integer
        quantity:
          type: integer
          minimum: 1

    CollectionResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        entries:
          type: array
          items:
            $ref: '#/components/schemas/CollectionEntryResponse'

    CreateTradeRequest:
      type: object
      required:
        - requesterUserId
        - targetUserId
        - offeredStickerNumber
        - requestedStickerNumber
      properties:
        requesterUserId:
          type: string
          format: uuid
        targetUserId:
          type: string
          format: uuid
        offeredStickerNumber:
          type: integer
          minimum: 1
        requestedStickerNumber:
          type: integer
          minimum: 1

    TradeProposalResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        requesterUserId:
          type: string
          format: uuid
        targetUserId:
          type: string
          format: uuid
        offeredStickerNumber:
          type: integer
        requestedStickerNumber:
          type: integer
        status:
          type: string
          enum: [PROPOSED]
        createdAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string

  responses:
    BadRequest:
      description: Regra de negócio ou validação violada
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Recurso não encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
